name: Reconstruct Hero Image
on:
  push:
    branches: [main]
    paths:
      - 'assets/chunks/chunk_14.txt'
jobs:
  reconstruct:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Reconstruct image from chunks
        run: |
          # Decode chunk_07_partB from hex
          cat assets/chunks/chunk_07_partB_hex.txt | xxd -r -p > /tmp/chunk_07_partB.txt
          # Concatenate all chunks
          cat assets/chunks/chunk_00.txt \
              assets/chunks/chunk_01.txt \
              assets/chunks/chunk_02.txt \
              assets/chunks/chunk_03.txt \
              assets/chunks/chunk_04.txt \
              assets/chunks/chunk_05.txt \
              assets/chunks/chunk_06.txt \
              assets/chunks/chunk_07_partA.txt \
              /tmp/chunk_07_partB.txt \
              assets/chunks/chunk_07_partC.txt \
              assets/chunks/chunk_08.txt \
              assets/chunks/chunk_09.txt \
              assets/chunks/chunk_10.txt \
              assets/chunks/chunk_11.txt \
              assets/chunks/chunk_12.txt \
              assets/chunks/chunk_13.txt \
              assets/chunks/chunk_14.txt > /tmp/combined.b64
          base64 -d /tmp/combined.b64 > assets/hero-bg.jpg
          echo "Decoded image size: $(wc -c < assets/hero-bg.jpg) bytes"
      - name: Remove chunk files
        run: rm -rf assets/chunks/
      - name: Commit and push reconstructed image
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add assets/hero-bg.jpg
          git rm -r --cached assets/chunks/ --ignore-unmatch || true
          git commit -m "Reconstruct hero-bg.jpg from base64 chunks"
          git push
